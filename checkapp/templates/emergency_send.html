<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>緊急生存確認送信</title>

    <style>

        body{

            background:#f2f2f2;
            font-family:sans-serif;
            margin:0;
            padding:0;

        }

        .container{

            width:90%;
            max-width:600px;
            margin:50px auto;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);

        }

        h1{

            text-align:center;
            color:red;
            margin-bottom:30px;

        }

        select{

            width:100%;
            padding:15px;
            border-radius:10px;
            font-size:20px;

        }

        button{

            width:100%;
            margin-top:30px;
            background:red;
            color:white;
            border:none;
            padding:20px;
            border-radius:15px;
            font-size:24px;
            font-weight:bold;
            cursor:pointer;

        }

        button:hover{

            background:#cc0000;

        }

    </style>

</head>

<body>

<div class="container">

<h1>
🚨 緊急生存確認送信
</h1>

<form method="POST">

{% csrf_token %}

<select name="region">

    <option value="福岡">
        福岡
    </option>

    <option value="熊本">
        熊本
    </option>

    <option value="長崎">
        長崎
    </option>

    <option value="佐賀">
        佐賀
    </option>

</select>

<button type="submit">
緊急送信
</button>

</form>

</div>

</body>
</html>
