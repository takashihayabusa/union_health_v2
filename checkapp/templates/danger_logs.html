<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>要注意者一覧</title>
</head>

<body>

<h1 style="color:red;">
要注意者一覧
</h1>

<table border="1" cellpadding="10">

<tr>
    <th>時間</th>
    <th>名前</th>
    <th>地域</th>
    <th>内容</th>
</tr>

{% for log in logs %}

<tr>

    <td>{{ log.created_at }}</td>

    <td>{{ log.name }}</td>

    <td>{{ log.region }}</td>

    <td style="color:red; font-weight:bold;">
        {{ log.message }}
    </td>

</tr>

{% endfor %}

</table>

</body>
</html>
