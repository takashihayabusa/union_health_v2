<!DOCTYPE html>

<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>組合員登録</title>

```
<style>

    body{
        font-family:sans-serif;
        background:#f5f5f5;
        padding:20px;
    }

    .box{
        background:white;
        max-width:600px;
        margin:auto;
        padding:30px;
        border-radius:15px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
        text-align:center;
        color:#008000;
        font-size:32px;
    }

    label{
        font-size:22px;
        font-weight:bold;
    }

    select,
    input{
        width:100%;
        padding:15px;
        font-size:20px;
        margin-top:10px;
        margin-bottom:20px;
        border:1px solid #ccc;
        border-radius:8px;
        box-sizing:border-box;
    }

    button{
        width:100%;
        padding:18px;
        font-size:24px;
        background:#06C755;
        color:white;
        border:none;
        border-radius:10px;
    }

</style>
```

</head>

<body>

<div class="box">

```
<h1>組合員登録</h1>

<form method="POST">

    {% csrf_token %}

    <label>地域</label>

    <select name="region">
        <option value="福岡">福岡</option>
        <option value="熊本">熊本</option>
        <option value="長崎">長崎</option>
        <option value="佐賀">佐賀</option>
    </select>

    <label>お名前</label>

    <input
        type="text"
        name="name"
        placeholder="お名前を入力してください"
        required
    >

    <button type="submit">
        登録する
    </button>

</form>
```

</div>

</body>
</html>
